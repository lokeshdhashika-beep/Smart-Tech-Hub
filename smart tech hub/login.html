<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Tech Hub</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            overflow-x: hidden;
        }

        /* Animated Background */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        .shape-1 {
            top: -100px;
            left: -100px;
            width: 500px;
            height: 500px;
            background: rgba(0, 217, 255, 0.2);
            animation-delay: 0s;
        }

        .shape-2 {
            bottom: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: rgba(157, 78, 221, 0.2);
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(50px, 50px) rotate(20deg);
            }
        }

        /* Card Container */
        .auth-perspective {
            width: 100%;
            max-width: 480px;
            perspective: 1000px;
            position: relative;
            min-height: 600px;
            /* Pre-allocate space */
        }

        .auth-card {
            width: 100%;
            padding: 40px;
            position: absolute;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        /* States for Flip Animation */
        .auth-card.front {
            transform: rotateY(0deg);
            z-index: 2;
        }

        .auth-card.back {
            transform: rotateY(180deg);
            z-index: 1;
        }

        .flipped .auth-card.front {
            transform: rotateY(-180deg);
            z-index: 1;
        }

        .flipped .auth-card.back {
            transform: rotateY(0deg);
            z-index: 2;
        }

        /* Inner Elements */
        .auth-logo {
            font-size: 32px;
            font-weight: 800;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            display: inline-block;
            cursor: pointer;
            position: relative;
        }

        .auth-logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }

        .auth-logo:hover::after {
            width: 100%;
        }

        .auth-title {
            color: var(--text-main);
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .auth-subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Modern Input Fields */
        .input-group {
            position: relative;
            margin-bottom: 28px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: linear-gradient(135deg, rgba(10, 14, 23, 0.8), rgba(20, 26, 37, 0.6));
            border: 2px solid transparent;
            border-radius: 14px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            background-clip: padding-box;
            position: relative;
        }

        .input-group::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.5;
            transition: opacity 0.4s;
        }

        .input-group:focus-within::before {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 1;
        }

        .input-group i {
            position: absolute;
            left: 17px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: all 0.4s;
            z-index: 1;
        }

        .input-group label {
            position: absolute;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            font-weight: 500;
            z-index: 1;
        }

        /* Focus & Filled States */
        .input-group input:focus,
        .input-group input:not(:placeholder-shown) {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.08), rgba(79, 172, 254, 0.05));
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.15), inset 0 1px 3px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .input-group input:focus~label,
        .input-group input:not(:placeholder-shown)~label {
            top: -10px;
            left: 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--primary);
            background: linear-gradient(90deg, var(--dark-bg) 0%, var(--dark-bg) 100%);
            padding: 2px 8px;
            border-radius: 6px;
            letter-spacing: 0.5px;
        }

        .input-group input:focus~i {
            color: var(--primary);
            transform: translateY(-50%) scale(1.1);
        }

        /* Button */
        button.primary-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 12px;
            margin-top: 10px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        button.primary-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        button.primary-btn:hover::before {
            left: 100%;
        }

        /* Switch Text */
        .switch-form {
            margin-top: 25px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .switch-link {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            position: relative;
            margin-left: 5px;
            transition: color 0.3s;
        }

        .switch-link:hover {
            color: var(--secondary);
            text-shadow: 0 0 10px rgba(157, 78, 221, 0.5);
        }

        /* Error/Shake Animation */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-10px);
            }

            40%,
            80% {
                transform: translateX(10px);
            }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
            border-color: var(--danger) !important;
        }

        /* Close Button Design */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .close-btn:hover {
            background: linear-gradient(135deg, rgba(255, 77, 87, 0.2), rgba(255, 107, 107, 0.1));
            border-color: var(--danger);
            color: var(--danger);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 4px 15px rgba(255, 77, 87, 0.3);
        }

        .close-btn i {
            font-size: 18px;
            transition: transform 0.3s;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <!-- Liquid Background -->
        <div class="liquid-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <div class="auth-perspective" id="card-container">

            <!-- Login Side (Front) -->
            <div class="auth-card glass-panel front">
                <a href="index.html" class="close-btn" title="Back to Home">
                    <i class="fas fa-times"></i>
                </a>
                <div style="text-align: center;">
                    <div class="auth-logo" onclick="window.location.href='index.html'">Smart Tech Hub</div>
                    <h2 class="auth-title">Welcome Back!</h2>
                    <p class="auth-subtitle">Login to access your personalized tech world</p>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <input type="text" id="login-email" placeholder=" " required>
                        <i class="fas fa-envelope"></i>
                        <label>Email or Username</label>
                    </div>

                    <div class="input-group">
                        <input type="password" id="login-password" placeholder=" " required>
                        <i class="fas fa-lock"></i>
                        <label>Password</label>
                    </div>

                    <div style="text-align: right; margin-bottom: 20px;">
                        <a href="#" style="color: var(--text-muted); font-size: 12px; text-decoration: none;">Forgot
                            Password?</a>
                    </div>

                    <button type="submit" class="primary-btn">SIGN IN</button>

                    <div class="switch-form" style="text-align: center;">
                        Don't have an account? <span class="switch-link" onclick="toggleFlip()">Create one now</span>
                    </div>

                    <p
                        style="font-size: 12px; color: var(--text-muted); margin-top: 15px; text-align: center; opacity: 0.6;">
                        (Admin Access: admin / admin)
                    </p>
                </form>
            </div>

            <!-- Signup Side (Back) -->
            <div class="auth-card glass-panel back">
                <a href="index.html" class="close-btn" title="Back to Home">
                    <i class="fas fa-times"></i>
                </a>
                <div style="text-align: center;">
                    <div class="auth-logo" onclick="window.location.href='index.html'">Smart Tech Hub</div>
                    <h2 class="auth-title">Join the Hub</h2>
                    <p class="auth-subtitle">Create an account to start shopping</p>
                </div>

                <form id="signup-form">
                    <div class="input-group">
                        <input type="text" id="signup-name" placeholder=" " required>
                        <i class="fas fa-user"></i>
                        <label>Full Name</label>
                    </div>

                    <div class="input-group">
                        <input type="email" id="signup-email" placeholder=" " required>
                        <i class="fas fa-envelope"></i>
                        <label>Email Address</label>
                    </div>

                    <div class="input-group">
                        <input type="password" id="signup-pass" placeholder=" " required>
                        <i class="fas fa-lock"></i>
                        <label>Password</label>
                    </div>

                    <button type="submit" class="primary-btn">CREATE ACCOUNT</button>

                    <div class="switch-form" style="text-align: center;">
                        Already existing? <span class="switch-link" onclick="toggleFlip()">Log In here</span>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Animation Logic
        function toggleFlip() {
            const container = document.getElementById('card-container');
            container.classList.toggle('flipped');

            // Interaction Sound (Optional)
            // const audio = new Audio('click.mp3'); 
            // audio.play().catch(e => {}); 
        }

        // Add shake effect to inputs if empty on submit (handled in auth.js mostly, but we can add visual feedback)
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('invalid', () => {
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 400);
            });
        });
    </script>
</body>

</html>
